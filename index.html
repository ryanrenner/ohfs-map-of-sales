
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homes Ryan Has Helped Buy and Sell in Omaha</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    /* Simple "no locations" warning shown if locations.js is empty */
    #empty-notice {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 20px 28px;
      font-family: sans-serif;
      font-size: 14px;
      color: #555;
      text-align: center;
      z-index: 10;
    }
  </style>

<script src="locations.js"></script>
  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAYCZWhIiw8lZU2tR9qjPak2cXNRf-E3Ks&callback=initMap&loading=async"></script>

  
</head>
<body>

  <div id="map"></div>
  <div id="empty-notice">
    No locations loaded yet.<br>
    Run <code>geocode.py</code> to generate <code>locations.js</code>.
  </div>


  <!--
    MarkerClusterer — groups nearby pins at low zoom levels.
    Loaded from unpkg (a stable, widely-used CDN for npm packages).
  -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer@2/dist/index.min.js"></script>

  <script>
    function initMap() {
      // Show a notice if geocode.py hasn't been run yet
      if (typeof LOCATIONS === 'undefined' || LOCATIONS.length === 0) {
        document.getElementById("empty-notice").style.display = "block";
        return;
      }

      const map = new google.maps.Map(document.getElementById("map"), {
        // Center on Omaha, NE
        center: { lat: 41.2565, lng: -96.0100 },
        zoom: 10,

        // Clean UI — hide controls that aren't useful in an iframe
        mapTypeControl: false,
        streetViewControl: false,
        fullscreenControl: false,
        zoomControl: true,

        styles: [
          { featureType: "all", elementType: "geometry", stylers: [{ color: "#f1f0ef" }] },
          { featureType: "all", elementType: "labels.text.fill", stylers: [{ color: "#3a3938" }] },
          { featureType: "all", elementType: "labels.text.stroke", stylers: [{ color: "#f1f0ef" }, { lightness: 13 }] },
          { featureType: "administrative", elementType: "geometry.stroke", stylers: [{ color: "#cccccc" }, { weight: 1 }] },
          { featureType: "administrative.country", elementType: "labels.text.fill", stylers: [{ color: "#3a3938" }] },
          { featureType: "administrative.province", elementType: "labels.text.fill", stylers: [{ color: "#3a3938" }] },
          { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#3a3938" }] },
          { featureType: "administrative.locality", elementType: "labels.text.stroke", stylers: [{ color: "#f1f0ef" }] },
          { featureType: "administrative.neighborhood", elementType: "labels.text.fill", stylers: [{ color: "#999999" }] },
          { featureType: "administrative.land_parcel", elementType: "labels", stylers: [{ visibility: "off" }] },
          { featureType: "landscape", elementType: "geometry", stylers: [{ color: "#f1f0ef" }] },
          { featureType: "landscape.natural", elementType: "geometry", stylers: [{ color: "#e4f2ec" }] },
          { featureType: "poi", elementType: "all", stylers: [{ visibility: "off" }] },
          { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#c5e8d6" }, { visibility: "on" }] },
          { featureType: "poi.park", elementType: "labels", stylers: [{ visibility: "simplified" }] },
          { featureType: "poi.park", elementType: "labels.text.fill", stylers: [{ color: "#3a3938" }] },
          { featureType: "poi.park", elementType: "labels.text.stroke", stylers: [{ color: "#f1f0ef" }] },
          { featureType: "road.highway", elementType: "geometry.fill", stylers: [{ color: "#66cc99" }] },
          { featureType: "road.highway", elementType: "geometry.stroke", stylers: [{ color: "#4aaa7a" }, { weight: 1.5 }] },
          { featureType: "road.highway", elementType: "labels.text.fill", stylers: [{ color: "#ffffff" }] },
          { featureType: "road.highway", elementType: "labels.text.stroke", stylers: [{ color: "#3a3938" }, { weight: 2 }] },
          { featureType: "road.arterial", elementType: "geometry.fill", stylers: [{ color: "#ffffff" }] },
          { featureType: "road.arterial", elementType: "geometry.stroke", stylers: [{ color: "#cccccc" }] },
          { featureType: "road.arterial", elementType: "labels.text.fill", stylers: [{ color: "#3a3938" }] },
          { featureType: "road.arterial", elementType: "labels.text.stroke", stylers: [{ color: "#f1f0ef" }] },
          { featureType: "road.local", elementType: "geometry.fill", stylers: [{ color: "#ffffff" }] },
          { featureType: "road.local", elementType: "geometry.stroke", stylers: [{ color: "#ebebeb" }] },
          { featureType: "road.local", elementType: "labels.text.fill", stylers: [{ color: "#999999" }] },
          { featureType: "road.local", elementType: "labels.text.stroke", stylers: [{ color: "#f1f0ef" }] },
          { featureType: "transit", elementType: "geometry", stylers: [{ color: "#ebebeb" }] },
          { featureType: "transit", elementType: "labels.text.fill", stylers: [{ color: "#999999" }] },
          { featureType: "transit.station", elementType: "labels", stylers: [{ visibility: "simplified" }] },
          { featureType: "water", elementType: "geometry", stylers: [{ color: "#cde8f0" }] },
          { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#999999" }] },
          { featureType: "water", elementType: "labels.text.stroke", stylers: [{ color: "#cde8f0" }] }
        ]
      });

      // Custom pin icon — uses the site's primary blue
      const pinIcon = {
        path: google.maps.SymbolPath.CIRCLE,
        fillColor: "#1B4F9B",
        fillOpacity: 1,
        strokeColor: "#ffffff",
        strokeWeight: 1.5,
        scale: 7
      };

      // Build one Marker per location (no popup — pins only)
      const markers = LOCATIONS.map(function(loc) {
        return new google.maps.Marker({
          position: { lat: loc.lat, lng: loc.lng },
          icon: pinIcon,
          title: loc.address || ""
        });
      });

      // Cluster nearby pins so the map doesn't look overwhelming at low zoom
      new markerClusterer.MarkerClusterer({
        map: map,
        markers: markers,
        renderer: {
          // Custom cluster bubble style to match the pin color
          render: function({ count, position }) {
            var size = count < 10 ? 36 : count < 50 ? 44 : 52;
            return new google.maps.Marker({
              position: position,
              icon: {
                path: google.maps.SymbolPath.CIRCLE,
                fillColor: "#1B4F9B",
                fillOpacity: 0.9,
                strokeColor: "#ffffff",
                strokeWeight: 2,
                scale: size / 3.5
              },
              label: {
                text: String(count),
                color: "#ffffff",
                fontWeight: "bold",
                fontSize: count < 10 ? "12px" : "11px"
              },
              zIndex: 1000 + count
            });
          }
        }
      });
    }

    window.initMap = initMap;
  </script>


</body>
</html>
